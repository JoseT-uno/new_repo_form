name: 'Terraformer'
description: 'Execute terraform plan and apply steps'
author: 'JoseT-uno'
inputs:
  ARM_CLIENT_ID:
    description: 'The Azure Client ID '
    required: true
  ARM_CLIENT_SECRET:
    description: 'The Azure client secret'
    required: true
  ARM_SUBSCRIPTION_ID:
    description: 'The Azure sub'
    required: true
  ARM_TENANT_ID:
    description: 'The Azure tenant id '
    required: true
  STATE_KEY:
    description: 'The unqiue key for state lookup'
    required: true
  TF_STAGE:
    description: 'The TF deployement stage'
    required: true
  DJANGO_SECRET_KEY_PROD:
    description: 'the secret key for django startup'
    required: false
runs:
  using: 'docker'
  image: 'Dockerfile'
